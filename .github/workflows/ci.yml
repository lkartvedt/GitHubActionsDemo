name: CI

# "on" triggers on every push to main and on every pull request
# as part of the standard "check code before and after it lands" pattern.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # "runs-on" gets a fresh, empty Ubuntu VM. Starts with nothing, no code.
    runs-on: ubuntu-latest
    steps:
      # "uses: actions/checkout@v4" pulls the repo's code onto the VM. 
      - uses: actions/checkout@v4
      # "uses: actions/setup-python@v5" installs Python 3.12 on the VM.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # "run" are shell commands to install my dependencies, then run the tests
      - run: pip install -r requirements.txt
      - run: pytest -v
